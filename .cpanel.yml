---
# cPanel Git™ Version Control deployment.
# Runs automatically (from the repo root) when you click "Deploy HEAD Commit"
# in cPanel — no terminal needed. vendor/ and public/build are committed, so
# there is no Composer/Node step here.
#
# `artisan up` runs FIRST and unconditionally so a deploy always brings the app
# OUT of maintenance mode — it can never get stuck showing 503 again. We never
# run `artisan down`, so the site stays live throughout.
#
# PHP binary: this host runs CloudLinux alt-php 8.4, whose CLI is at
# /opt/alt/php84/usr/bin/php. If that path ever changes, update it here.
# All tasks are tolerant (|| true) so a deploy never hard-fails.
#
# `db:seed --force` provisions the first-time baseline (admin user, roles /
# permissions, default warehouse, number series). The seeders are idempotent
# (firstOrCreate / syncPermissions), so re-running on every deploy is safe and
# keeps permissions in sync.
deployment:
  tasks:
    - /opt/alt/php84/usr/bin/php artisan up || true
    - /opt/alt/php84/usr/bin/php artisan migrate --force || true
    - /opt/alt/php84/usr/bin/php artisan db:seed --force || true
    - /opt/alt/php84/usr/bin/php artisan storage:link || true
    - /opt/alt/php84/usr/bin/php artisan optimize:clear || true
