; Per-directory PHP settings, honored by PHP-FPM / LSAPI (no terminal needed).
; Caps memory so the FPM worker can start within the account's resource limits
; — fixes the "503 Service Unavailable / temporarily busy" on CloudLinux where
; an oversized memory_limit gets the worker killed on spawn.
memory_limit = 256M
max_execution_time = 120
upload_max_filesize = 20M
post_max_size = 20M
